name: Build and push Docker image

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  IMAGE_NAME: weather-frontend

jobs:
  docker:
    name: Build and push weather-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub settings
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_NAMESPACE" || (echo "Missing repository variable: DOCKERHUB_NAMESPACE" && exit 1)
          test -n "$DOCKERHUB_USERNAME" || (echo "Missing repository secret: DOCKERHUB_USERNAME" && exit 1)
          test -n "$DOCKERHUB_TOKEN" || (echo "Missing repository secret: DOCKERHUB_TOKEN" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./DOCKERFILE
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Central Helm Chart Tag (GitOps)
        env:
          HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
        run: |
          if [ -z "$HELM_REPO_PAT" ]; then
            echo "::warning::Missing HELM_REPO_PAT secret. Skipping GitOps update of central Helm chart."
            exit 0
          fi

          if [ "${{ github.ref_name }}" = "main" ]; then
            VALUES_FILE="values-main.yaml"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            VALUES_FILE="values-dev.yaml"
          else
            echo "Not running on main or dev branch. Skipping GitOps update."
            exit 0
          fi

          # Obtain the short SHA of the current commit
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_TAG="sha-${SHORT_SHA}"

          echo "Updating central Helm chart image tag to ${NEW_TAG} in ${VALUES_FILE}"

          # Setup Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone central Helm repository
          git clone https://${HELM_REPO_PAT}@github.com/${{ github.repository_owner }}/HelmChartsFinalProject.git central-helm
          cd central-helm

          TARGET_FILE="${{ env.IMAGE_NAME }}/${VALUES_FILE}"

          if [ -f "$TARGET_FILE" ]; then
            # Update the image tag line under the image: section
            sed -i -E '/image:/,/tag:/ { s/(tag:\s*).*/\1'"$NEW_TAG"'/ }' "$TARGET_FILE"
            
            git add "$TARGET_FILE"
            git commit -m "chore(gitops): update ${{ env.IMAGE_NAME }} tag to ${NEW_TAG} [skip ci]"
            git push origin main
          else
            echo "Error: Target values file ${TARGET_FILE} not found in central repository."
            exit 1
          fi
